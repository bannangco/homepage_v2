server {
    listen 80;
    listen [::]:80;

    server_name bannangco.com www.bannangco.com;

    root /var/www/bannangco-homepage/out;
    index index.html;

    access_log /var/log/nginx/bannangco-homepage.access.log;
    error_log /var/log/nginx/bannangco-homepage.error.log;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    error_page 404 /404.html;

    location = /_headers {
        return 404;
    }

    location ^~ /_next/static/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # The export uses trailingSlash: false; normalize non-root slash URLs so
    # both /announcements and /announcements/ resolve predictably.
    location ~ ^(.+)/$ {
        return 308 $1$is_args$args;
    }

    location / {
        # Prefer exported clean-URL HTML before a same-named directory that
        # may hold future announcement detail files.
        try_files $uri.html $uri/index.html $uri =404;
    }
}
